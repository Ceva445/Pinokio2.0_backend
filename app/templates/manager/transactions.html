{% extends "manager/base_manager.html" %}

{% block manager_content %}
<h2>📝 Historia Rejestracji</h2>

<div style="margin-bottom:10px">
    <input
        id="transactionEmployeeSearch"
        placeholder="Pracownik"
        style="width:220px"
    >

    <input
        id="transactionDeviceSearch"
        placeholder="Urządzenie"
        style="width:220px"
    >

    <input
        id="transactionDateFrom"
        type="date"
        style="width:160px"
    >

    <input
        id="transactionDateTo"
        type="date"
        style="width:160px"
    >
    <select id="transactionType" style="width:180px">
        <option value="">Wszystkie typy</option>
        <option value="registered">registered</option>
        <option value="unregistered">unregistered</option>
    </select>
</div>

<table id="transactionsTable">
    <thead>
        <tr>
            <th>Data / czas</th>
            <th>Typ</th>
            <th>Pracownik</th>
            <th>Urządzenie</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<div
    id="transactionsPagination"
    style="margin-top:10px"
></div>

<script>
let transactionsPage = 1;
const TRANSACTIONS_PER_PAGE = 10;

async function api(url, options = {}) {
    const res = await fetch(url, {
        credentials: "include",
        headers: {
            "Content-Type": "application/json"
        },
        ...options
    });

    if (!res.ok) {
        const error = await res.json();
        throw new Error(error.detail || "API Error");
    }

    return res.status === 204 ? null : res.json();
}

async function loadTransactions(page = 1) {
    const tbody = document.querySelector("#transactionsTable tbody");
    if (!tbody) return;

    const employeeInput = document.getElementById("transactionEmployeeSearch");
    const deviceInput = document.getElementById("transactionDeviceSearch");
    const dateFromInput = document.getElementById("transactionDateFrom");
    const dateToInput = document.getElementById("transactionDateTo");
    const typeInput = document.getElementById("transactionType");

    const employee_q = employeeInput?.value ?? "";
    const device_q = deviceInput?.value ?? "";
    const date_from = dateFromInput?.value ?? "";
    const date_to = dateToInput?.value ?? "";
    const tx_type = typeInput?.value ?? "";

    const params = new URLSearchParams({
        page: page,
        limit: TRANSACTIONS_PER_PAGE
    });

    if (employee_q) params.append("employee_q", employee_q);
    if (device_q) params.append("device_q", device_q);
    if (date_from) params.append("date_from", date_from);
    if (date_to) params.append("date_to", date_to);
    if (tx_type) params.append("tx_type", tx_type);

    tbody.innerHTML = `<tr><td colspan="4">Ładowanie danych...</td></tr>`;

    try {
        const data = await api(`/manager/api/transactions?${params.toString()}`);

        tbody.innerHTML = "";

        if (data.items.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4">Nic nie znaleziono</td></tr>`;
        }

        for (const t of data.items) {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${new Date(t.timestamp).toLocaleString()}</td>
                <td>${t.type}</td>
                <td>
                    ${t.employee
                        ? `${t.employee.wms_login ?? ""} ${t.employee.first_name} ${t.employee.last_name}`
                        : "—"}
                </td>
                <td>${t.device?.name ?? "—"}</td>
            `;
            tbody.appendChild(tr);
        }

        renderTransactionsPagination(data.page, data.pages);

    } catch (err) {
        tbody.innerHTML = `<tr><td colspan="4">Błąd: ${err.message}</td></tr>`;
    }
}

function renderTransactionsPagination(page, pages) {
    const container = document.getElementById("transactionsPagination");
    if (!container) return;

    container.innerHTML = "";
    container.style.cssText = `
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        flex-wrap: wrap;
        padding: 20px 0;
    `;

    // Info text
    const info = document.createElement("span");
    info.style.cssText = `
        font-size: 14px;
        color: var(--text-secondary, #94a3b8);
        margin-right: 16px;
    `;
    info.textContent = `Strona ${page} z ${pages}`;
    container.appendChild(info);

    // Previous button
    const prevBtn = document.createElement("button");
    prevBtn.textContent = "← Wstecz";
    prevBtn.disabled = page === 1;
    prevBtn.style.cssText = `
        padding: 8px 14px;
        font-size: 13px;
        border-radius: 6px;
        border: 1px solid var(--text-secondary, #94a3b8);
        background: transparent;
        color: var(--text-primary, #f1f5f9);
        cursor: ${page === 1 ? 'not-allowed' : 'pointer'};
        opacity: ${page === 1 ? '0.5' : '1'};
        transition: all 0.2s ease;
    `;
    if (page > 1) {
        prevBtn.addEventListener("mouseover", () => {
            prevBtn.style.background = "rgba(59, 130, 246, 0.15)";
            prevBtn.style.borderColor = "var(--primary, #3b82f6)";
        });
        prevBtn.addEventListener("mouseout", () => {
            prevBtn.style.background = "transparent";
            prevBtn.style.borderColor = "var(--text-secondary, #94a3b8)";
        });
        prevBtn.addEventListener("click", () => loadTransactions(page - 1));
    }
    container.appendChild(prevBtn);

    // Page range calculation
    const maxVisible = 5;
    let start = Math.max(1, page - Math.floor(maxVisible / 2));
    let end = Math.min(pages, start + maxVisible - 1);
    
    if (end - start + 1 < maxVisible) {
        start = Math.max(1, end - maxVisible + 1);
    }

    // Add ellipsis at the beginning
    if (start > 1) {
        const firstBtn = document.createElement("button");
        firstBtn.textContent = "1";
        firstBtn.style.cssText = `
            padding: 8px 12px;
            font-size: 13px;
            border-radius: 6px;
            border: 1px solid var(--text-secondary, #94a3b8);
            background: transparent;
            color: var(--text-primary, #f1f5f9);
            cursor: pointer;
            transition: all 0.2s ease;
        `;
        firstBtn.addEventListener("mouseover", () => {
            firstBtn.style.background = "rgba(59, 130, 246, 0.15)";
            firstBtn.style.borderColor = "var(--primary, #3b82f6)";
        });
        firstBtn.addEventListener("mouseout", () => {
            firstBtn.style.background = "transparent";
            firstBtn.style.borderColor = "var(--text-secondary, #94a3b8)";
        });
        firstBtn.addEventListener("click", () => loadTransactions(1));
        container.appendChild(firstBtn);

        if (start > 2) {
            const ellipsis = document.createElement("span");
            ellipsis.textContent = "...";
            ellipsis.style.cssText = `
                color: var(--text-secondary, #94a3b8);
                padding: 0 4px;
            `;
            container.appendChild(ellipsis);
        }
    }

    // Page buttons in the range
    for (let p = start; p <= end; p++) {
        const btn = document.createElement("button");
        btn.textContent = p;
        const isActive = p === page;
        btn.style.cssText = `
            padding: 8px 12px;
            font-size: 13px;
            border-radius: 6px;
            border: 1px solid ${isActive ? 'var(--primary, #3b82f6)' : 'var(--text-secondary, #94a3b8)'};
            background: ${isActive ? 'var(--primary, #3b82f6)' : 'transparent'};
            color: ${isActive ? 'white' : 'var(--text-primary, #f1f5f9)'};
            cursor: ${isActive ? 'default' : 'pointer'};
            font-weight: ${isActive ? '600' : '400'};
            transition: all 0.2s ease;
        `;
        btn.disabled = isActive;
        
        if (!isActive) {
            btn.addEventListener("mouseover", () => {
                btn.style.background = "rgba(59, 130, 246, 0.15)";
                btn.style.borderColor = "var(--primary, #3b82f6)";
            });
            btn.addEventListener("mouseout", () => {
                btn.style.background = "transparent";
                btn.style.borderColor = "var(--text-secondary, #94a3b8)";
            });
        }
        btn.addEventListener("click", () => loadTransactions(p));
        container.appendChild(btn);
    }

    // Add ellipsis at the end
    if (end < pages) {
        if (end < pages - 1) {
            const ellipsis = document.createElement("span");
            ellipsis.textContent = "...";
            ellipsis.style.cssText = `
                color: var(--text-secondary, #94a3b8);
                padding: 0 4px;
            `;
            container.appendChild(ellipsis);
        }

        const lastBtn = document.createElement("button");
        lastBtn.textContent = pages;
        lastBtn.style.cssText = `
            padding: 8px 12px;
            font-size: 13px;
            border-radius: 6px;
            border: 1px solid var(--text-secondary, #94a3b8);
            background: transparent;
            color: var(--text-primary, #f1f5f9);
            cursor: pointer;
            transition: all 0.2s ease;
        `;
        lastBtn.addEventListener("mouseover", () => {
            lastBtn.style.background = "rgba(59, 130, 246, 0.15)";
            lastBtn.style.borderColor = "var(--primary, #3b82f6)";
        });
        lastBtn.addEventListener("mouseout", () => {
            lastBtn.style.background = "transparent";
            lastBtn.style.borderColor = "var(--text-secondary, #94a3b8)";
        });
        lastBtn.addEventListener("click", () => loadTransactions(pages));
        container.appendChild(lastBtn);
    }

    // Next button
    const nextBtn = document.createElement("button");
    nextBtn.textContent = "Naprzód →";
    nextBtn.disabled = page === pages;
    nextBtn.style.cssText = `
        padding: 8px 14px;
        font-size: 13px;
        border-radius: 6px;
        border: 1px solid var(--text-secondary, #94a3b8);
        background: transparent;
        color: var(--text-primary, #f1f5f9);
        cursor: ${page === pages ? 'not-allowed' : 'pointer'};
        opacity: ${page === pages ? '0.5' : '1'};
        transition: all 0.2s ease;
        margin-left: 16px;
    `;
    if (page < pages) {
        nextBtn.addEventListener("mouseover", () => {
            nextBtn.style.background = "rgba(59, 130, 246, 0.15)";
            nextBtn.style.borderColor = "var(--primary, #3b82f6)";
        });
        nextBtn.addEventListener("mouseout", () => {
            nextBtn.style.background = "transparent";
            nextBtn.style.borderColor = "var(--text-secondary, #94a3b8)";
        });
        nextBtn.addEventListener("click", () => loadTransactions(page + 1));
    }
    container.appendChild(nextBtn);
}

document.addEventListener("DOMContentLoaded", () => {
    if (!document.querySelector("#transactionsTable")) return;

    loadTransactions();

    const employeeInput = document.getElementById("transactionEmployeeSearch");
    const deviceInput = document.getElementById("transactionDeviceSearch");
    const dateFromInput = document.getElementById("transactionDateFrom");
    const dateToInput = document.getElementById("transactionDateTo");
    const typeInput = document.getElementById("transactionType");

    [employeeInput, deviceInput, dateFromInput, dateToInput, typeInput].forEach(el => {
        if (el) el.addEventListener("change", () => loadTransactions(1));
    });
});
</script>
{% endblock %}
