{% extends "admin/base_admin.html" %}

{% block admin_content %}
<h2>Statusy urządzeń</h2>

<div class="admin-form" style="margin-bottom:20px;">
    <div class="form-group">
        <label>Nazwa statusu</label>
        <input id="statusName" placeholder="np. Active">
    </div>

    <div class="form-group">
        <label>Opis</label>
        <input id="statusDesc" placeholder="Opis statusu">
    </div>

    <button class="btn btn-primary" onclick="createStatus()">
        ➕ Dodaj status
    </button>
</div>

<table id="statusTable">
    <thead>
        <tr>
            <th>ID</th>
            <th>Nazwa</th>
            <th>Opis</th>
            <th>Akcje</th>
        </tr>
    </thead>

    <tbody></tbody>
</table>

<script src="{{ url_for('static', path='js/admin/device_statuses.js') }}"></script>
{% endblock %}
