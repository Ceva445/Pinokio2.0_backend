{% extends "admin/base_admin.html" %}

{% block admin_content %}
<h2>Urządzenia</h2>

<input type="text" id="deviceSearch" placeholder="Szukaj po nazwie / numerze seryjnym / RFID"
    style="margin-bottom: 10px; width: 300px;">

<select id="deviceStatusFilter" style="min-width:250px;">
    <option value="">Brak statusu</option>
</select>

<div style="margin-bottom: 10px;">
    <a href="/admin/devices/create" class="btn btn-primary">
        ➕ Dodaj urządzenie
    </a>
</div>

<table id="devicesTable">
    <thead>
        <tr>
            <th>Nazwa</th>
            <th>Typ</th>
            <th>Site</th>
            <th>Seriiowy №</th>
            <th>RFID</th>
            <th>IP</th>
            <th>Porty</th>
            <th>Status</th>
            <th>Aktywne</th>
            <th>Przypisany do</th>
            <th></th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script src="{{ url_for('static', path='js/admin/admin.js') }}"></script>
{% endblock %}
