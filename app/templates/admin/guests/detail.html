{% extends "admin/base_admin.html" %}

{% block admin_content %}
<h2>Edytuj gościa</h2>

<form id="guestForm" class="admin-form">
    <div class="form-group">
        <label>Nazwa *</label>
        <input type="text" name="name" required>
    </div>

    <div class="form-group">
        <label>RFID</label>
        <input type="text" name="rfid">
    </div>

    <div class="form-group">
        <label>Użyty</label>
        <input type="checkbox" name="used" disabled>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">💾 Zapisz</button>
        <button type="button" class="btn danger" id="deleteBtn">Usuń</button>
        <a href="/admin/guests" class="btn">Anuluj</a>
    </div>
</form>

<script>
    const guestId = {{ guest_id }};
</script>
<script src="{{ url_for('static', path='js/admin/guests.js') }}"></script>
{% endblock %}
