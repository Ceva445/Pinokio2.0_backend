{% extends "admin/base_admin.html" %}

{% block admin_content %}
<h2>Dodaj gościa</h2>

<form id="guestCreateForm" class="admin-form">
    <div class="form-group">
        <label>Nazwa *</label>
        <input type="text" name="name" required>
    </div>

    <div class="form-group">
        <label>RFID</label>
        <input type="text" name="rfid">
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">💾 Stwórz</button>
        <a href="/admin/guests" class="btn">Anuluj</a>
    </div>
</form>

<script src="{{ url_for('static', path='js/admin/guests.js') }}"></script>
{% endblock %}
