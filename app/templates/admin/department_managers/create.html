{% extends "admin/base_admin.html" %}

{% block admin_content %}
<h2>Dodaj managera działu</h2>

<form id="managerCreateForm" class="admin-form">
    <div class="form-group">
        <label>Dział *</label>
        <input type="text" name="department" required>
    </div>

    <div class="form-group">
        <label>Email *</label>
        <input type="email" name="email" required>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">💾 Stwórz</button>
        <a href="/admin/department-managers" class="btn">Anuluj</a>
    </div>
</form>

<script src="{{ url_for('static', path='js/admin/department_managers.js') }}"></script>
{% endblock %}
