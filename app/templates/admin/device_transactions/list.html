{% extends "admin/base_admin.html" %}
{% block admin_content %}

<h2>Historia zmian urządzeń</h2>

<div style="margin-bottom:10px">
    <input id="deviceTransactionUserSearch" placeholder="Korzystnik" style="width:220px">
    <input id="deviceTransactionDeviceSearch" placeholder="Urządzenie" style="width:220px">
    <input id="deviceTransactionDateFrom" type="date" style="width:160px">
    <input id="deviceTransactionDateTo" type="date" style="width:160px">
</div>

<table id="deviceTransactionsTable">
    <thead>
        <tr>
            <th>Data / czas</th>
            <th>Korzystnik</th>
            <th>Urządzenie</th>
            <th>Opis zmian</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<div id="deviceTransactionsPagination" style="margin-top:10px"></div>

<script>
let deviceTransactionsPage = 1;
const DEVICE_TRANSACTIONS_PER_PAGE = 10;

async function loadDeviceTransactions(page = 1) {
    const tbody = document.querySelector("#deviceTransactionsTable tbody");
    if (!tbody) return;

    const userInput = document.getElementById("deviceTransactionUserSearch");
    const deviceInput = document.getElementById("deviceTransactionDeviceSearch");
    const dateFromInput = document.getElementById("deviceTransactionDateFrom");
    const dateToInput = document.getElementById("deviceTransactionDateTo");

    const user_q = userInput?.value ?? "";
    const device_q = deviceInput?.value ?? "";
    const date_from = dateFromInput?.value ?? "";
    const date_to = dateToInput?.value ?? "";

    const params = new URLSearchParams({
        page: page,
        limit: DEVICE_TRANSACTIONS_PER_PAGE
    });

    if (user_q) params.append("user_q", user_q);
    if (device_q) params.append("device_q", device_q);
    if (date_from) params.append("date_from", date_from);
    if (date_to) params.append("date_to", date_to);

    tbody.innerHTML = `<tr><td colspan="4">Ładowanie danych...</td></tr>`;

    try {
        const res = await fetch(`/admin/api/device-transactions?${params.toString()}`, { credentials: "include" });
        if (!res.ok) throw new Error(await res.text());
        const data = await res.json();

        tbody.innerHTML = "";
        if (data.items.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4">Nic nie znaleziono.о</td></tr>`;
        }

        for (const t of data.items) {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${new Date(t.timestamp).toLocaleString()}</td>
                <td>${t.user ? `${t.user.username} ${t.user.first_name} ${t.user.last_name}` : "—"}</td>
                <td>${t.device?.name ?? "—"}</td>
                <td>${t.description}</td>
            `;
            tbody.appendChild(tr);
        }

        renderDeviceTransactionsPagination(data.page, data.pages);
    } catch (err) {
        tbody.innerHTML = `<tr><td colspan="4">Błąd: ${err.message}</td></tr>`;
    }
}

function renderDeviceTransactionsPagination(page, pages) {
    const container = document.getElementById("deviceTransactionsPagination");
    if (!container) return;

    container.innerHTML = "";
    container.style.cssText = `
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        flex-wrap: wrap;
        padding: 20px 0;
    `;

    // Info text
    const info = document.createElement("span");
    info.style.cssText = `
        font-size: 14px;
        color: var(--text-secondary, #94a3b8);
        margin-right: 16px;
    `;
    info.textContent = `Strona ${page} z ${pages}`;
    container.appendChild(info);

    // Previous button
    const prevBtn = document.createElement("button");
    prevBtn.textContent = "← Wstecz";
    prevBtn.disabled = page === 1;
    prevBtn.style.cssText = `
        padding: 8px 14px;
        font-size: 13px;
        border-radius: 6px;
        border: 1px solid var(--text-secondary, #94a3b8);
        background: transparent;
        color: var(--text-primary, #f1f5f9);
        cursor: ${page === 1 ? 'not-allowed' : 'pointer'};
        opacity: ${page === 1 ? '0.5' : '1'};
        transition: all 0.2s ease;
    `;
    if (page > 1) {
        prevBtn.addEventListener("mouseover", () => {
            prevBtn.style.background = "rgba(59, 130, 246, 0.15)";
            prevBtn.style.borderColor = "var(--primary, #3b82f6)";
        });
        prevBtn.addEventListener("mouseout", () => {
            prevBtn.style.background = "transparent";
            prevBtn.style.borderColor = "var(--text-secondary, #94a3b8)";
        });
        prevBtn.addEventListener("click", () => loadDeviceTransactions(page - 1));
    }
    container.appendChild(prevBtn);

    // Page range calculation
    const maxVisible = 5;
    let start = Math.max(1, page - Math.floor(maxVisible / 2));
    let end = Math.min(pages, start + maxVisible - 1);
    
    if (end - start + 1 < maxVisible) {
        start = Math.max(1, end - maxVisible + 1);
    }

    // Add ellipsis at the beginning
    if (start > 1) {
        const firstBtn = document.createElement("button");
        firstBtn.textContent = "1";
        firstBtn.style.cssText = `
            padding: 8px 12px;
            font-size: 13px;
            border-radius: 6px;
            border: 1px solid var(--text-secondary, #94a3b8);
            background: transparent;
            color: var(--text-primary, #f1f5f9);
            cursor: pointer;
            transition: all 0.2s ease;
        `;
        firstBtn.addEventListener("mouseover", () => {
            firstBtn.style.background = "rgba(59, 130, 246, 0.15)";
            firstBtn.style.borderColor = "var(--primary, #3b82f6)";
        });
        firstBtn.addEventListener("mouseout", () => {
            firstBtn.style.background = "transparent";
            firstBtn.style.borderColor = "var(--text-secondary, #94a3b8)";
        });
        firstBtn.addEventListener("click", () => loadDeviceTransactions(1));
        container.appendChild(firstBtn);

        if (start > 2) {
            const ellipsis = document.createElement("span");
            ellipsis.textContent = "...";
            ellipsis.style.cssText = `
                color: var(--text-secondary, #94a3b8);
                padding: 0 4px;
            `;
            container.appendChild(ellipsis);
        }
    }

    // Page buttons in the range
    for (let p = start; p <= end; p++) {
        const btn = document.createElement("button");
        btn.textContent = p;
        const isActive = p === page;
        btn.style.cssText = `
            padding: 8px 12px;
            font-size: 13px;
            border-radius: 6px;
            border: 1px solid ${isActive ? 'var(--primary, #3b82f6)' : 'var(--text-secondary, #94a3b8)'};
            background: ${isActive ? 'var(--primary, #3b82f6)' : 'transparent'};
            color: ${isActive ? 'white' : 'var(--text-primary, #f1f5f9)'};
            cursor: ${isActive ? 'default' : 'pointer'};
            font-weight: ${isActive ? '600' : '400'};
            transition: all 0.2s ease;
        `;
        btn.disabled = isActive;
        
        if (!isActive) {
            btn.addEventListener("mouseover", () => {
                btn.style.background = "rgba(59, 130, 246, 0.15)";
                btn.style.borderColor = "var(--primary, #3b82f6)";
            });
            btn.addEventListener("mouseout", () => {
                btn.style.background = "transparent";
                btn.style.borderColor = "var(--text-secondary, #94a3b8)";
            });
        }
        btn.addEventListener("click", () => loadDeviceTransactions(p));
        container.appendChild(btn);
    }

    // Add ellipsis at the end
    if (end < pages) {
        if (end < pages - 1) {
            const ellipsis = document.createElement("span");
            ellipsis.textContent = "...";
            ellipsis.style.cssText = `
                color: var(--text-secondary, #94a3b8);
                padding: 0 4px;
            `;
            container.appendChild(ellipsis);
        }

        const lastBtn = document.createElement("button");
        lastBtn.textContent = pages;
        lastBtn.style.cssText = `
            padding: 8px 12px;
            font-size: 13px;
            border-radius: 6px;
            border: 1px solid var(--text-secondary, #94a3b8);
            background: transparent;
            color: var(--text-primary, #f1f5f9);
            cursor: pointer;
            transition: all 0.2s ease;
        `;
        lastBtn.addEventListener("mouseover", () => {
            lastBtn.style.background = "rgba(59, 130, 246, 0.15)";
            lastBtn.style.borderColor = "var(--primary, #3b82f6)";
        });
        lastBtn.addEventListener("mouseout", () => {
            lastBtn.style.background = "transparent";
            lastBtn.style.borderColor = "var(--text-secondary, #94a3b8)";
        });
        lastBtn.addEventListener("click", () => loadDeviceTransactions(pages));
        container.appendChild(lastBtn);
    }

    // Next button
    const nextBtn = document.createElement("button");
    nextBtn.textContent = "Naprzód →";
    nextBtn.disabled = page === pages;
    nextBtn.style.cssText = `
        padding: 8px 14px;
        font-size: 13px;
        border-radius: 6px;
        border: 1px solid var(--text-secondary, #94a3b8);
        background: transparent;
        color: var(--text-primary, #f1f5f9);
        cursor: ${page === pages ? 'not-allowed' : 'pointer'};
        opacity: ${page === pages ? '0.5' : '1'};
        transition: all 0.2s ease;
        margin-left: 16px;
    `;
    if (page < pages) {
        nextBtn.addEventListener("mouseover", () => {
            nextBtn.style.background = "rgba(59, 130, 246, 0.15)";
            nextBtn.style.borderColor = "var(--primary, #3b82f6)";
        });
        nextBtn.addEventListener("mouseout", () => {
            nextBtn.style.background = "transparent";
            nextBtn.style.borderColor = "var(--text-secondary, #94a3b8)";
        });
        nextBtn.addEventListener("click", () => loadDeviceTransactions(page + 1));
    }
    container.appendChild(nextBtn);
}

document.addEventListener("DOMContentLoaded", () => {
    if (!document.querySelector("#deviceTransactionsTable")) return;
    loadDeviceTransactions();

    const userInput = document.getElementById("deviceTransactionUserSearch");
    const deviceInput = document.getElementById("deviceTransactionDeviceSearch");
    const dateFromInput = document.getElementById("deviceTransactionDateFrom");
    const dateToInput = document.getElementById("deviceTransactionDateTo");

    let timeout;
    [userInput, deviceInput].forEach(input => {
        if (!input) return;
        input.addEventListener("input", () => {
            clearTimeout(timeout);
            timeout = setTimeout(() => loadDeviceTransactions(1), 300);
        });
    });

    [dateFromInput, dateToInput].forEach(input => {
        if (!input) return;
        input.addEventListener("change", () => loadDeviceTransactions(1));
    });
});
</script>

{% endblock %}
