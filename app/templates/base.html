<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ESP32 Live Monitor{% endblock %}</title>
    {% block styles %}{% endblock %}
</head>
<body>

<header style="display:flex; justify-content:flex-end; margin-bottom:20px; gap:10px;">
    <a href="/" id="homeBtn" style="display:none;">Do strony głównej</a>
    <a href="/admin" id="adminBtn" style="display:none;">Panel administracyjny</a>
    <a href="/login" id="loginBtn">Zaloguj się</a>
    <a href="#" id="logoutBtn" class="button-link" style="display:none;">Wyloguj się</a>
</header>

{% block content %}{% endblock %}

<script>
async function checkAuth() {
    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const adminBtn = document.getElementById("adminBtn");
    const homeBtn  = document.getElementById("homeBtn");

    const isAdminPage = window.location.pathname.startsWith("/admin");

    const res = await fetch("/auth/me", {
        credentials: "include"
    });

    if (!res.ok) {
        // ❌ не залогінений
        document.body.classList.add("guest");
        document.body.classList.remove("auth");

        loginBtn.style.display = "inline";
        logoutBtn.style.display = "none";
        adminBtn.style.display = "none";
        homeBtn.style.display = "none";
        return;
    }

    const user = await res.json();

    // ✔ залогінений
    loginBtn.style.display = "none";
    logoutBtn.style.display = "inline";

    if (user.role === "admin") {
        if (isAdminPage) {
            // 🟢 в адмінці → показати "На головну"
            adminBtn.style.display = "none";
            homeBtn.style.display = "inline";
        } else {
            // 🟢 не в адмінці → показати "Адмінка"
            adminBtn.style.display = "inline";
            homeBtn.style.display = "none";
        }
    } else {
        // 👤 не адмін
        adminBtn.style.display = "none";
        homeBtn.style.display = "none";
    }
}

document.getElementById("logoutBtn")?.addEventListener("click", async () => {
    const res = await fetch("/auth/logout", {
        method: "POST",
        credentials: "include"
    });

    if (res.ok) {
        window.location.href = "/";
    } else {
        alert("Nie udało się wylogować");
    }
});

checkAuth();
</script>


{% block body_scripts %}{% endblock %}
</body>
</html>
